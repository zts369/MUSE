<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="profile-style.css">
    <title>Hotel Transylvania Guest Profile</title>
</head>
    <body class="profile-page-body">
        <div class="light-page">

        </div>
        <div id="nav-placeholder"></div>
        <main class="profile-main">
            

            <h2 class="page-title">Guest Profile</h2>

            <div class="profile-grid">

                <section class="card guest-info-card">
                    <h3 class="card-header">Guest Info</h3>
                    <div class="info-group">
                        <div class="info-row">
                            <span class="label">Full Name</span>
                            <span id="det-name" class="value"></span>
                        </div>
                        <div class="info-row">
                            <span class="label">Phone</span>
                            <span id="det-phone" class="value"></span>
                        </div>
                        <div class="info-row">
                            <span class="label">Email</span>
                            <span id="det-email" class="value"></span>
                        </div>
                    </div>
                    <a href="#" class="edit-link">Edit Profile</a>
                </section>

                <section class="card history-card">
                    <h3 class="card-header">Booking History</h3>
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Room</th>
                                <th>Amount</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="history-table-body"></tbody>
                    </table>
                </section>

            </div>

            
        </main>
        
        <script src="guestData.js"></script>
        <script src="footerscript.js"></script>
        <script src="navscript.js"></script>

        <script>
            const urlParams = new URLSearchParams(window.location.search);
            const guestName = urlParams.get('guest');

            function renderPage() {
                if (guestName && guestDataStore[guestName]) {
                    const data = guestDataStore[guestName];
                    
                    document.getElementById('det-name').innerText = guestName;
                    document.getElementById('det-phone').innerText = data.phone;
                    document.getElementById('det-email').innerText = data.email;

                    const tableBody = document.getElementById('history-table-body');
                    tableBody.innerHTML = "";

                    data.bookings.forEach((booking) => {
                        const tr = document.createElement('tr');
                        
                        let displayStatus = booking.status === "Checked-Out" ? "Completed" : booking.status;
                        
                        let actionHtml = "";
                        if (booking.status === "Reserved") {
                            actionHtml = `<button class="cancel-btn" onclick="cancelBooking('${booking.id}')">Cancel</button>`;
                        }

                        tr.innerHTML = `
                            <td class="date-cell">${booking.in} -<br>${booking.out}</td>
                            <td>${booking.room}</td>
                            <td>₱${booking.total.toLocaleString()}</td>
                            <td>
                                <div class="status-cell">
                                    <span class="status-text">${displayStatus}</span>
                                    ${actionHtml}
                                </div>
                            </td>
                        `;
                        tableBody.appendChild(tr);
                    });
                }
            }

            function cancelBooking(bookingId) {
                if (confirm(`Are you sure you want to cancel booking ${bookingId}?`)) {
                    const guest = guestDataStore[guestName];
                    guest.bookings = guest.bookings.filter(b => b.id !== bookingId);
                    
                    alert("Booking cancelled successfully.");
                    renderPage();
                }
            }

            renderPage();
        </script>

    </body>
</html>
