<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="frontdesk-style.css">
    <title>Guest History | Hotel Transylvania</title>
</head>
<body class="fd-wrapper">
    <main class="fd-content-section">
        <header class="content-header">
            <h2 id="history-title" class="header-font">Guest History</h2>
            <button type="button" onclick="window.history.back()" class="link-btn">← Back to Guest Directory</button>
        </header>

        <div class="fd-table-card">
            <div class="guest-summary-box">
                <p><strong>Email:</strong> <span id="det-email"></span></p>
                <p><strong>Phone:</strong> <span id="det-phone"></span></p>
            </div>
            
            <h4 class="section-label">Current & Upcoming Stays</h4>
            <div id="active-bookings-container" class="history-container"></div>

            <h4 class="section-label">Past Reservations</h4>
            <div id="past-bookings-container" class="history-container"></div>
        </div>
    </main>

    <script src="guestData.js"></script>
    <script>
        // Inside guestHistory.html <script>
        const urlParams = new URLSearchParams(window.location.search);
        const guestName = urlParams.get('guest');

        if (guestName && guestDataStore[guestName]) {
            const data = guestDataStore[guestName];
            document.getElementById('history-title').innerText = `${guestName}'s History`;
            document.getElementById('det-email').innerText = data.email;
            document.getElementById('det-phone').innerText = data.phone;

            const activeStays = data.bookings.filter(b => b.status === "Reserved" || b.status === "Checked-In");
            
            const pastStays = data.bookings.filter(b => b.status === "Checked-Out");

            // Render them to their respective containers
            renderHistoryItems(activeStays, 'active-bookings-container');
            renderHistoryItems(pastStays, 'past-bookings-container');
        }

        function renderHistoryItems(items, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = ""; 
            if (items.length === 0) {
                container.innerHTML = `<p class="no-data">No records found for this section.</p>`;
                return;
            }

            items.forEach(booking => {
                // Assign color class based on status
                let statusClass = "status-reserved"; 
                if (booking.status === "Checked-In") statusClass = "status-checkedin"; 
                if (booking.status === "Checked-Out") statusClass = "status-checkedout";

                const div = document.createElement('div');
                div.className = 'booking-item';
                div.innerHTML = `
                    <div class="booking-flex">
                        <div class="booking-info">
                            <p><strong>ID:</strong> ${booking.id}</p>
                            <p><strong>Room:</strong> ${booking.room}</p>
                            <p><strong>Check-in:</strong> ${booking.in} | <strong>Check-out:</strong>  ${booking.out}</p>
                        </div>
                        <div class="status-control">
                            <span class="status-badge ${statusClass}">${booking.status}</span>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
