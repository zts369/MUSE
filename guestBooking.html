                ]
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const guestName = urlParams.get('guest');

        if (guestName && guestDataStore[guestName]) {
            const data = guestDataStore[guestName];
            
            document.getElementById('booking-title').innerText = `${guestName}'s Booking`;
            document.getElementById('det-email').innerText = data.email;
            document.getElementById('det-phone').innerText = data.phone;

            const container = document.getElementById('booking-items-container');
            
            data.bookings.forEach((booking, index) => {
                const formattedTotal = Number(booking.total).toLocaleString();
                const currentStatus = booking.status || 'Reserved';

                const item = document.createElement('div');
                item.className = 'booking-item';
                
                item.innerHTML = `
                    <div class="booking-flex">
                        <div class="booking-info">
                            <p><strong>Booking ID:</strong> <small>${booking.id}</small></p>
                            <p><strong>Room:</strong> ${booking.room}</p>
                            <p><strong>Check-In:</strong> ${booking.in} | <strong>Check-Out:</strong> ${booking.out}</p>
                            <p><strong>Guests:</strong> ${booking.adults} Adults, ${booking.children} Children</p>
                            <p><strong>Total:</strong> ₱${formattedTotal}</p>
                        </div>
                        
                        <div class="status-control">
                            <label class="status-label">Status</label>
                            <select class="status-select" onchange="updateStatus('${guestName}', ${index}, this)">
                                <option value="Reserved" ${currentStatus === 'Reserved' ? 'selected' : ''}>Reserved</option>
                                <option value="Checked-In" ${currentStatus === 'Checked-In' ? 'selected' : ''}>Checked-In</option>
                                <option value="Checked-Out" ${currentStatus === 'Checked-Out' ? 'selected' : ''}>Checked-Out</option>
                                <option value="Cancelled" ${currentStatus === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        </div>
                    </div>
                `;
                container.appendChild(item);
                
                // Initialize color for the select element
                const selectElement = item.querySelector('.status-select');
                applyStatusColor(selectElement);
            });
        }

        function updateStatus(guest, bookingIndex, selectElement) {
            const newStatus = selectElement.value;
            guestDataStore[guest].bookings[bookingIndex].status = newStatus;
            applyStatusColor(selectElement);
            console.log(`Updated ${guest}'s booking to: ${newStatus}`);
        }

        function applyStatusColor(selectElement) {
            // Remove existing color classes
            selectElement.classList.remove('status-reserved', 'status-checkedin', 'status-checkedout', 'status-cancelled');
            
            // Add specific color class
            const val = selectElement.value.toLowerCase().replace('-', '');
            selectElement.classList.add(`status-${val}`);
        }
