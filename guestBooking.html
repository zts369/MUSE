        if (guestName && guestDataStore[guestName]) {
            const data = guestDataStore[guestName];

            document.getElementById('det-email').innerText = data.email;
            document.getElementById('det-phone').innerText = data.phone;

            const container = document.getElementById('booking-items-container');
            data.bookings.forEach(booking => {

                const formattedTotal = Number(booking.total).toLocaleString();

                const item = document.createElement('div');
                item.className = 'booking-item'; // Style this in your CSS
                item.style.borderBottom = "1px solid #eee";
                item.style.padding = "15px 0";
                item.innerHTML = `
                    <p><strong>Booking ID:</strong> <small>${booking.id}</small></p>
                    <p><strong>Room:</strong> ${booking.room}</p>
                    <p><strong>Check-In:</strong> ${booking.in} | <strong>Check-Out:</strong> ${booking.out}</p>
                    <p><strong>Guests:</strong> ${booking.adults} Adults, ${booking.children} Children</p>
                    <p><strong>Total:</strong> ₱${formattedTotal}</p>
                `;
                container.appendChild(item);
            });
        } else {
